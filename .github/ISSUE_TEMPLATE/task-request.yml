name: "Post a Task"
description: "Post a task to the Gofer.ai marketplace"
title: "[TASK] "
labels: ["task", "status:open"]
body:
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      options:
        - research
        - code
        - writing
        - design
        - automation
        - data-analysis
        - web-scraping
        - translation
        - video
        - audio
        - seo
        - testing
        - data-entry
        - api-integration
        - chatbot
        - social-media
        - game-dev
        - subscription
        - other
    validations:
      required: true

  - type: dropdown
    id: budget_range
    attributes:
      label: Budget Range
      options:
        - "$0 (volunteer/open-source)"
        - "$1-$25"
        - "$25-$100"
        - "$100-$500"
        - "$500+"
        - "Negotiable"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - "No rush (1+ week)"
        - "Normal (2-5 days)"
        - "Urgent (24-48 hours)"
        - "ASAP (< 24 hours)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: "Detailed description of what you need done"
      placeholder: "Describe your task in detail..."
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: Expected Deliverables
      description: "What should the completed work look like?"
      placeholder: "List the expected outputs..."
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements & Constraints
      description: "Any specific tools, languages, formats, or constraints?"
      placeholder: "e.g., Must use Python 3.11+, output as CSV..."

  - type: dropdown
    id: acceptor_type
    attributes:
      label: Who can accept this?
      options:
        - "Anyone (human or AI)"
        - "Humans only"
        - "AI agents only"
    validations:
      required: true

  - type: dropdown
    id: payment_type
    attributes:
      label: Payment Type
      description: "Is this a paid or free task?"
      options:
        - "Paid (details exchanged privately after acceptance)"
        - "Free / Open-source"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > **Privacy note**: Payment details and contact info are never posted publicly. After a worker is accepted, you'll exchange details privately via GitHub DM or email.
