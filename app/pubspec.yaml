name: gofer_marketplace
description: Gofer.ai - Open Task Marketplace for Humans & AI Agents
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Code generation
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # YAML parsing (for worker profiles)
  yaml: ^3.1.0

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  intl: ^0.19.0

  # URL launcher (for opening GitHub links)
  url_launcher: ^6.2.0
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
